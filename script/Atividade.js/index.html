<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafios JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>1. Divisor de Conta</h2>
        
        <label>Valor Total (R$):</label>
        <input type="number" id="valorTotal" placeholder="Ex: 250.00" step="0.01">

        <label>Número de Clientes:</label>
        <input type="number" id="clientes" placeholder="Ex: 5">

        <button onclick="dividirConta()">Calcular Divisão</button>

        <div id="resultadoConta" class="resultado"></div>
    </div>

    <div class="container">
        <h2>2. Vizinhos Numéricos</h2>
        
        <label>Digite um número:</label>
        <input type="number" id="numeroInput" placeholder="Ex: 100">

        <button onclick="verVizinhos()">Exibir Sequência</button>

        <div id="resultadoVizinhos" class="resultado"></div>
    </div>

    <script>
        function dividirConta() {
            const valor = parseFloat(document.getElementById('valorTotal').value);
            const qtd = parseInt(document.getElementById('clientes').value);
            const display = document.getElementById('resultadoConta');

            if (valor > 0 && qtd > 0) {
                const divisao = valor / qtd;
                display.className = "resultado res-conta";
                display.innerHTML = `Cada um paga: R$ ${divisao.toFixed(2).replace('.', ',')}`;
            } else {
                display.innerHTML = "⚠️ Insira valores válidos!";
            }
        }

        function verVizinhos() {
            const num = parseInt(document.getElementById('numeroInput').value);
            const display = document.getElementById('resultadoVizinhos');

            if (!isNaN(num)) {
                const ant = num - 1;
                const suc = num + 1;
                display.className = "resultado res-num";
                display.innerHTML = `${ant} &larr; [ ${num} ] &rarr; ${suc}`;
            } else {
                display.innerHTML = "⚠️ Digite um número!";
            }
        }
    </script>
</body>
</html>
