<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/index.css">

     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>

<body>
   <form action="#">
        <h1>FORMULARIO FODA</h1>
        <!-- INPUT NOME  -->
        <div class="formAssunto">
        <label for="Nome">Nome : </label>
       <input id="Nome" required type="text" placeholder="Ponha Seu Nome Aqui">
    </div>
      <!-- INPUT EMAIL -->
     <div class="formAssunto">
        <label for="Email">Email</label> 
         <input id="Email" type="email" placeholder="Exemplo @Gmail.com">
    </div>
     </div>
      <!-- INPUT COR -->
     <div class="formAssunto">
        <label for="Cor">Email</label> 
         <input id="Cor" type="Color">
    </div>
    </div>
        <!-- INPUT IDADE -->
     <div class="formAssunto">
        <label for="Idade">idade : </label>
       <input id="Idade" type="number" min="0" max="200" step="1">
    </div>
    <!-- SELECT ESTADO -->
     <Select name="estado" id="estado">
          <option value=""> - </option>
          <option value="SP">Sao Paulo</option>
          <option value="DF">Distrito Federal</option>
     </Select>
    <!-- FEEDBACK -->
     <div class="formAssunto">
     <textarea style="resize: none;" name="feedback" id="feedback" cols="35" rows="10">
     </textarea>
     </div>
    <!-- ENVIAR -->
    <!-- <input type="button" valeu="ENVIAR"> -->
      <button type="submit" value="ENVIAR"></button>
      <button type="reset" value="RESETAR"></button>
      <button type="button" id="Bemvindo">NOME</button>
    </form>
</body>

<script>
    document.getElementById("bemvindo").addEventListener("click", () => {
        nome = document.getElementById("nome").value
        alert("Seja bem vindo(a)"+nome)
    })
</script>
</html>
